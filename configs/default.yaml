# ==============================================================================
# NEXUS-ATMS — Next-Generation Urban Intelligence Platform
# Default Configuration
# ==============================================================================

# --- Device Settings ---
device:
  type: "cuda"                 # Force GPU for all training — cuda | cpu
  gpu_index: 0                 # GPU index (RTX 2050)

# --- Environment Settings ---
environment:
  network_file: "networks/single_intersection.net.xml"
  route_file: "networks/single_intersection.rou.xml"
  grid_network_file: "networks/grid_4x4/grid_4x4.net.xml"
  grid_route_file: "networks/grid_4x4/grid_4x4.rou.xml"
  reward:
    type: "combined"           # waiting_time | queue | combined
    waiting_time_weight: 0.5
    queue_weight: 0.3
    throughput_weight: 0.2

# --- SUMO Simulation Settings ---
sumo:
  max_steps: 3600              # Simulation steps per episode (1 hour)
  delta_time: 5                # Seconds between agent decisions
  yellow_time: 3               # Yellow phase duration (seconds)
  min_green: 10                # Minimum green phase (seconds)
  max_green: 60                # Maximum green phase (seconds)
  gui: false                   # Use SUMO-GUI (set true for visual debugging)

# --- Agent Hyperparameters (GPU-accelerated) ---
agent:
  learning_rate: 0.0003        # Adam optimizer LR
  gamma: 0.99                  # Discount factor
  device: "cuda"               # GPU training enforced

  dqn:
    buffer_size: 100000        # Replay buffer size
    batch_size: 128            # Increased for GPU efficiency
    target_update_freq: 1000
    epsilon_start: 1.0
    epsilon_end: 0.05
    epsilon_decay: 0.995

  ppo:
    n_steps: 2048              # Steps per rollout
    batch_size: 128            # Increased for GPU efficiency
    n_epochs: 10
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5

# --- Training Settings ---
training:
  total_timesteps: 500000
  eval_freq: 10000
  n_eval_episodes: 5
  save_freq: 50000
  seed: 42
  log_interval: 100

# --- LSTM Predictor (GPU-accelerated) ---
lstm:
  device: "cuda"
  horizon: 6                   # 6 x 5min = 30-min forecast
  seq_len: 24                  # 24 x 5min = 2-hour look-back
  step_minutes: 5.0
  hidden: 128
  epochs: 30
  learning_rate: 0.001
  batch_size: 32
  model_path: "models/lstm_predictor.pt"

# --- Vision (YOLOv8n — GPU accelerated) ---
vision:
  model: "yolov8n.pt"          # Nano model, fast on RTX 2050
  device: "cuda"
  confidence: 0.4
  classes: [2, 3, 5, 7]        # car, motorcycle, bus, truck (COCO IDs)

# --- Emergency Corridor ---
emergency:
  enabled: true
  cascade_lookahead: 4         # Junctions ahead to pre-clear
  corridor_timeout: 300        # Auto-revert after 5 min (seconds)

# --- Carbon Credit Engine ---
carbon:
  idle_emission_kg_per_min: 0.21   # Average petrol car
  fuel_cost_per_litre: 103.0       # INR
  fuel_consumption_idle: 0.8       # litres/hour idle

# --- Pedestrian Safety ---
pedestrian:
  device: "cuda"
  crowd_density_threshold: 15      # People at crossing
  elderly_extension_seconds: 10    # Extra crossing time
  school_zone_hours:
    morning: [7, 45, 8, 15]        # 07:45 – 08:15
    afternoon: [14, 45, 15, 15]    # 14:45 – 15:15

# --- Cybersecurity ---
security:
  enabled: true
  max_phase_switch_rate: 6         # Max changes per minute per junction
  anomaly_window: 60               # Seconds to detect anomaly bursts

# --- Road Maintenance ---
maintenance:
  hard_braking_threshold: -4.0     # m/s² deceleration
  location_cluster_radius: 20.0    # metres
  min_events_for_flag: 5           # Flagged after 5+ events at same spot
  days_lookback: 7

# --- Natural Language Commands ---
nl_command:
  spacy_model: "en_core_web_sm"

# --- Voice Broadcast ---
voice:
  language: "en"
  fallback_language: "hi"

# --- Demo Mode ---
demo:
  timesteps: 50000             # Quick training for demos (~5-10 min)
  scenario: "rush_hour"

# --- Dashboard ---
dashboard:
  host: "0.0.0.0"
  port: 8000
  update_interval: 1.0         # Seconds between WebSocket updates
