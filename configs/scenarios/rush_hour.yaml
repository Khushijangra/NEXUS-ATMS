# Rush Hour Traffic Scenario
# High volume, peak congestion conditions
scenario:
  name: "rush_hour"
  description: "Peak traffic conditions with 1500 vehicles/hour"
  duration: 3600        # 1 hour simulation
  vehicles_per_hour: 1500
  distribution: "uniform"
  peak_factor: 1.0
  routes:
    north_south: 0.35   # 35% of traffic
    south_north: 0.35
    east_west: 0.15
    west_east: 0.15
