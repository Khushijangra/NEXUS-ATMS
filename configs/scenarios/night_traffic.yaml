# Night Traffic Scenario
# Low volume, sparse traffic
scenario:
  name: "night"
  description: "Low nighttime traffic with 200 vehicles/hour"
  duration: 3600
  vehicles_per_hour: 200
  distribution: "poisson"
  peak_factor: 0.2
  routes:
    north_south: 0.30
    south_north: 0.30
    east_west: 0.20
    west_east: 0.20
